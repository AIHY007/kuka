<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>售后工程师技能图鉴</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>
  <main class="app-shell">
    <section id="hallView" class="view view-active" aria-label="工程师大厅">
      <header class="system-bar">
        <div class="brand-lockup">
          <div class="brand-sigil" aria-hidden="true">KUKA</div>
          <div>
            <p class="eyebrow">KUKA Engineer's Skill</p>
            <h1 id="siteTitle">售后工程师技能图鉴</h1>
          </div>
        </div>

        <label class="command-search">
          <span aria-hidden="true"></span>
          <input id="searchInput" type="search" placeholder="搜索姓名 / 地区 / 工作地 / 岗位" autocomplete="off">
        </label>

        <button class="primary-action" id="rankEntry" type="button">勋章排行榜</button>
        <button class="primary-action" id="mapEntry" type="button">工程师地图</button>
      </header>

      <div id="loadError" class="load-error" role="alert"></div>

      <div class="hall-layout">
        <aside class="panel filter-dock" aria-label="筛选面板">
          <div class="panel-heading">
            <h2>筛选矩阵</h2>
            <span id="filterState">全部</span>
          </div>
          <div class="field">
            <label for="regionFilter">地区</label>
            <select id="regionFilter"></select>
          </div>
          <div class="field">
            <label for="workLocationFilter">工作地</label>
            <select id="workLocationFilter"></select>
          </div>
          <div class="field">
            <label for="roleFilter">岗位</label>
            <select id="roleFilter"></select>
          </div>
          <div class="field">
            <label for="badgeFilter">勋章总数</label>
            <select id="badgeFilter">
              <option value="all">全部</option>
              <option value="0-3">0 到 3 枚</option>
              <option value="4-5">4 到 5 枚</option>
              <option value="6+">6 枚以上</option>
            </select>
          </div>
          <!-- 新增：三类勋章筛选器 -->
          <div class="field">
            <label for="skillFilter">技能勋章</label>
            <select id="skillFilter">
              <option value="all">全部</option>
            </select>
          </div>
          <div class="field">
            <label for="certificateFilter">证书勋章</label>
            <select id="certificateFilter">
              <option value="all">全部</option>
            </select>
          </div>
          <div class="field">
            <label for="trainingFilter">培训勋章</label>
            <select id="trainingFilter">
              <option value="all">全部</option>
            </select>
          </div>
          <button class="ghost-action" id="resetFilters" type="button">重置筛选</button>
        </aside>

        <section class="main-panel panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Engineer Roster</p>
              <h2>工程师大厅</h2>
            </div>
            <span id="resultCount" class="data-caption">读取中</span>
          </div>
          <div class="engineer-grid" id="engineerGrid"></div>
        </section>

        <aside class="panel leaderboard" id="rankPanel" aria-label="勋章排行榜">
          <div class="panel-heading">
            <h2>勋章排行榜</h2>
            <span>点击进入档案</span>
          </div>
          <div class="segmented" id="rankTabs">
            <button class="tab tab-active" type="button" data-rank="total">总勋章</button>
            <button class="tab" type="button" data-rank="legendary">传奇</button>
            <button class="tab" type="button" data-rank="skill">技能</button>
          </div>
          <div class="rank-list" id="rankList"></div>
        </aside>
      </div>
    </section>

    <section id="profileView" class="view" aria-label="工程师专属档案">
      <div class="profile-nav">
        <button class="ghost-action" id="backBtn" type="button">返回大厅</button>
        <span id="profileHint" class="data-caption">工程师专属档案</span>
      </div>

      <div class="profile-layout">
        <section class="panel dossier" id="profileHero"></section>
        <aside class="panel achievement-panel" id="overviewPanel"></aside>
      </div>

      <section class="panel medal-vault">
        <div class="panel-heading">
          <h2>勋章展示区</h2>
          <span id="badgeTabHint">技能勋章</span>
        </div>
        <div class="segmented badge-tabs" id="badgeTabs">
          <button class="tab tab-active" type="button" data-category="skill">技能勋章</button>
          <button class="tab" type="button" data-category="certificate">证书勋章</button>
          <button class="tab" type="button" data-category="training">培训勋章</button>
        </div>
        <div class="medal-grid" id="badgesGrid"></div>
      </section>
    </section>

    <section id="mapView" class="view" aria-label="工程师地图">
      <div class="profile-nav">
        <button class="ghost-action" id="mapBackBtn" type="button">返回大厅</button>
        <span class="data-caption">工程师地理分布</span>
      </div>
      <div class="map-legend" style="position:absolute;top:50%;right:24px;transform:translateY(-50%);background:rgba(255,255,255,0.92);padding:12px 16px;border-radius:8px;font-size:13px;line-height:1.8;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.12);">
        <div style="font-weight:600;margin-bottom:4px;color:#333;">边框色：省份</div>
        <div><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#a8d5a2;vertical-align:middle;margin-right:6px;"></span>华东</div>
        <div><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#7ec8e3;vertical-align:middle;margin-right:6px;"></span>北部</div>
        <div><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#e67e22;vertical-align:middle;margin-right:6px;"></span>中西</div>
        <div><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#1a5276;vertical-align:middle;margin-right:6px;"></span>华南</div>
        <div><span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#f5b041;vertical-align:middle;margin-right:6px;"></span>东北</div>
      </div>
      <div class="map-container" style="position:relative;">
        <div id="chinaMap" style="width:100%;height:100%;"></div>
      </div>
    </section>
    <!-- 勋章排行榜模态弹窗 -->
    <div class="modal-overlay" id="rankModal" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-header">
          <h2>勋章排行榜</h2>
          <button class="modal-close" id="rankModalClose" type="button" aria-label="关闭">&times;</button>
        </div>
        <div class="segmented" id="rankModalTabs">
          <button class="tab tab-active" type="button" data-rank="total">总勋章</button>
          <button class="tab" type="button" data-rank="legendary">传奇</button>
          <button class="tab" type="button" data-rank="skill">技能</button>
        </div>
        <div class="rank-list" id="rankModalList"></div>
      </div>
    </div>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
